# ============================================================
# Alembic 多数据库共享配置文件
# 每个数据库有独立的 [section] 和 script_location 目录
# 使用时通过 -n 参数指定数据库名:
#   alembic -n biliopusdb upgrade head
#   alembic -n bilidb revision --autogenerate -m "描述"
# ============================================================


# ---------- 日志 ----------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# ============================================================
# 各数据库独立 section
# sqlalchemy.url 为占位符，实际由 env.py 从 CONFIG 动态读取
# ============================================================

# ---------- biliopusdb: 第三方抽奖动态库 ----------
[biliopusdb]
script_location = alembic/biliopusdb
sqlalchemy.url = %(url_placeholder)s

# ---------- bilidb: 话题抽奖库 ----------
[bilidb]
script_location = alembic/bilidb
sqlalchemy.url = %(url_placeholder)s

# ---------- bili_reserve: 预约抽奖库 ----------
[bili_reserve]
script_location = alembic/bili_reserve
sqlalchemy.url = %(url_placeholder)s

# ---------- dyndetail: 动态详情库 ----------
[dyndetail]
script_location = alembic/dyndetail
sqlalchemy.url = %(url_placeholder)s

# ---------- proxy_db: 代理数据库 ----------
[proxy_db]
script_location = alembic/proxy_db
sqlalchemy.url = %(url_placeholder)s

# ---------- samsclub: 山姆会员店数据库 ----------
[samsclub]
script_location = alembic/samsclub
sqlalchemy.url = %(url_placeholder)s
